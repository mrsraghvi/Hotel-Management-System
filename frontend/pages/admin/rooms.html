<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Rooms — Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .room-status-dot { display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px; }
        .dot-available{ background:var(--success); } .dot-occupied{ background:var(--danger); }
        .dot-reserved{ background:var(--warning); } .dot-maintenance{ background:var(--mid-gray); }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/index.html" class="nav-logo">Grand<span>Royal</span></a>
    <div class="nav-links">
        <a href="/pages/admin/dashboard.html">Dashboard</a>
        <a href="/pages/admin/rooms.html" class="active">Rooms</a>
        <a href="/pages/admin/bookings.html">Bookings</a>
        <a href="/pages/admin/reports.html">Reports</a>
    </div>
    <div class="nav-auth" id="nav-auth"></div>
</nav>

<div class="page-wrapper">
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-label">Main</div>
                <a class="sidebar-link" href="/pages/admin/dashboard.html"><span class="sidebar-icon">📊</span> Dashboard</a>
                <a class="sidebar-link active" href="/pages/admin/rooms.html"><span class="sidebar-icon">🛏</span> Manage Rooms</a>
                <a class="sidebar-link" href="/pages/admin/bookings.html"><span class="sidebar-icon">📋</span> Bookings</a>
                <a class="sidebar-link" href="/pages/admin/users.html"><span class="sidebar-icon">👥</span> Customers</a>
                <a class="sidebar-link" href="/pages/admin/reports.html"><span class="sidebar-icon">📈</span> Reports</a>
            </div>
            <div class="sidebar-section">
                <a class="sidebar-link" onclick="logout()" style="cursor:pointer"><span class="sidebar-icon">🚪</span> Logout</a>
            </div>
        </aside>

        <main class="admin-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem">
                <div>
                    <h2 style="color:var(--secondary)">🛏 Manage Rooms</h2>
                    <p style="color:var(--mid-gray);font-size:0.88rem">Add, edit, and manage hotel rooms</p>
                </div>
                <button class="btn btn-primary" onclick="openAddRoom()">➕ Add New Room</button>
            </div>

            <!-- Filter Bar -->
            <div class="card" style="margin-bottom:1.5rem">
                <div class="card-body" style="padding:1rem">
                    <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end">
                        <div class="form-group" style="margin:0;flex:1;min-width:120px">
                            <label class="form-label">Filter by Type</label>
                            <select id="f-type" class="form-control" onchange="loadRooms()">
                                <option value="">All Types</option>
                                <option value="Single">Single</option>
                                <option value="Double">Double</option>
                                <option value="Deluxe">Deluxe</option>
                                <option value="Suite">Suite</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin:0;flex:1;min-width:120px">
                            <label class="form-label">Filter by Status</label>
                            <select id="f-status" class="form-control" onchange="loadRooms()">
                                <option value="">All Statuses</option>
                                <option value="available">Available</option>
                                <option value="occupied">Occupied</option>
                                <option value="reserved">Reserved</option>
                                <option value="maintenance">Maintenance</option>
                            </select>
                        </div>
                        <button class="btn btn-outline btn-sm" onclick="document.getElementById('f-type').value='';document.getElementById('f-status').value='';loadRooms()">Clear</button>
                    </div>
                </div>
            </div>

            <!-- Rooms Table -->
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Room No.</th>
                            <th>Type</th>
                            <th>Floor</th>
                            <th>Price/Night</th>
                            <th>Max Guests</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="rooms-tbody">
                        <tr><td colspan="7" style="text-align:center;padding:2rem"><div class="spinner" style="margin:0 auto"></div></td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<!-- Add/Edit Room Modal -->
<div class="modal-overlay" id="room-modal">
    <div class="modal" style="max-width:550px">
        <div class="modal-header">
            <h3 id="modal-title">Add New Room</h3>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="edit-id">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Room Number *</label>
                    <input type="text" id="r-number" class="form-control" placeholder="e.g. 101">
                </div>
                <div class="form-group">
                    <label class="form-label">Floor *</label>
                    <input type="number" id="r-floor" class="form-control" placeholder="1" min="1" max="50">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Room Type *</label>
                    <select id="r-type" class="form-control">
                        <option value="">Select Type</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Price Per Night (₹) *</label>
                    <input type="number" id="r-price" class="form-control" placeholder="2500" min="0">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Status</label>
                <select id="r-status" class="form-control">
                    <option value="available">Available</option>
                    <option value="maintenance">Maintenance</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea id="r-desc" class="form-control" placeholder="Brief room description..."></textarea>
            </div>
            <div id="room-form-error" class="alert alert-error hidden"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" id="save-btn" onclick="saveRoom()">Save Room</button>
        </div>
    </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/js/api.js"></script>
<script>
    if (!requireAdmin()) { }

    let roomTypes = [];

    async function loadRoomTypes() {
        const { ok, data } = await RoomAPI.getTypes();
        if (!ok) return;
        roomTypes = data.types || [];
        const sel = document.getElementById('r-type');
        roomTypes.forEach(t => {
            sel.innerHTML += `<option value="${t.id}">${t.type_name} (Base: ${formatCurrency(t.base_price)})</option>`;
        });
    }

    async function loadRooms() {
        const type   = document.getElementById('f-type').value;
        const status = document.getElementById('f-status').value;
        let qp = [];
        if (type)   qp.push(`type=${type}`);
        if (status) qp.push(`status=${status}`);

        const tbody = document.getElementById('rooms-tbody');
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:2rem"><div class="spinner" style="margin:0 auto"></div></td></tr>';

        const { ok, data } = await RoomAPI.getAll(qp.join('&'));
        if (!ok) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--danger)">Failed to load rooms.</td></tr>'; return; }

        const rooms = data.rooms || [];
        if (rooms.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--mid-gray)">No rooms found.</td></tr>';
            return;
        }

        tbody.innerHTML = rooms.map(r => `
            <tr>
                <td><strong>${r.room_number}</strong></td>
                <td>${r.type_name}</td>
                <td>Floor ${r.floor}</td>
                <td style="font-weight:600;color:var(--primary)">${formatCurrency(r.price_per_night)}</td>
                <td>${r.max_occupancy}</td>
                <td>
                    <span class="room-status-dot dot-${r.status}"></span>
                    ${getStatusBadge(r.status)}
                </td>
                <td>
                    <div style="display:flex;gap:0.5rem">
                        <button class="btn btn-outline btn-sm" onclick="editRoom(${JSON.stringify(r).replace(/"/g,'&quot;')})">✏️ Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteRoom(${r.id}, '${r.room_number}')">🗑 Delete</button>
                    </div>
                </td>
            </tr>`).join('');
    }

    function openAddRoom() {
        document.getElementById('modal-title').textContent = 'Add New Room';
        document.getElementById('edit-id').value = '';
        document.getElementById('r-number').value = '';
        document.getElementById('r-floor').value = '';
        document.getElementById('r-type').value = '';
        document.getElementById('r-price').value = '';
        document.getElementById('r-status').value = 'available';
        document.getElementById('r-desc').value = '';
        document.getElementById('r-number').disabled = false;
        document.getElementById('save-btn').textContent = 'Add Room';
        document.getElementById('room-form-error').classList.add('hidden');
        document.getElementById('room-modal').classList.add('active');
    }

    function editRoom(room) {
        document.getElementById('modal-title').textContent = `Edit Room ${room.room_number}`;
        document.getElementById('edit-id').value = room.id;
        document.getElementById('r-number').value = room.room_number;
        document.getElementById('r-number').disabled = true;
        document.getElementById('r-floor').value = room.floor;
        document.getElementById('r-type').value = room.room_type_id;
        document.getElementById('r-price').value = room.price_per_night;
        document.getElementById('r-status').value = room.status;
        document.getElementById('r-desc').value = room.description || '';
        document.getElementById('save-btn').textContent = 'Update Room';
        document.getElementById('room-form-error').classList.add('hidden');
        document.getElementById('room-modal').classList.add('active');
    }

    function closeModal() { document.getElementById('room-modal').classList.remove('active'); }

    async function saveRoom() {
        const errEl = document.getElementById('room-form-error');
        errEl.classList.add('hidden');
        const id     = document.getElementById('edit-id').value;
        const number = document.getElementById('r-number').value.trim();
        const floor  = document.getElementById('r-floor').value;
        const typeId = document.getElementById('r-type').value;
        const price  = document.getElementById('r-price').value;
        const status = document.getElementById('r-status').value;
        const desc   = document.getElementById('r-desc').value;

        if (!number || !typeId || !price || !floor) {
            errEl.textContent = '❌ Room number, type, floor, and price are required.';
            errEl.classList.remove('hidden');
            return;
        }

        const btn = document.getElementById('save-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Saving...';

        const body = { room_number: number, room_type_id: parseInt(typeId), floor: parseInt(floor), price_per_night: parseFloat(price), status, description: desc };
        const { ok, data } = id ? await RoomAPI.update(id, body) : await RoomAPI.create(body);

        if (ok && data.success) {
            showToast(data.message, 'success');
            closeModal();
            loadRooms();
        } else {
            errEl.textContent = '❌ ' + (data.message || 'Failed to save room.');
            errEl.classList.remove('hidden');
        }
        btn.disabled = false;
        btn.textContent = id ? 'Update Room' : 'Add Room';
    }

    async function deleteRoom(id, number) {
        if (!confirm(`Delete Room ${number}? This action cannot be undone.`)) return;
        const { ok, data } = await RoomAPI.delete(id);
        if (ok && data.success) { showToast(`Room ${number} deleted.`, 'success'); loadRooms(); }
        else showToast(data.message || 'Delete failed.', 'error');
    }

    // Update price when room type changes
    document.getElementById('r-type').addEventListener('change', function() {
        const selected = roomTypes.find(t => t.id == this.value);
        if (selected && !document.getElementById('edit-id').value) {
            document.getElementById('r-price').value = selected.base_price;
        }
    });

    loadRoomTypes();
    loadRooms();
</script>
</body>
</html>
