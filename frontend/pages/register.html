<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Grand Royal Hotel</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%); min-height: 100vh; }
        .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 6rem 1rem 2rem; }
        .auth-card { background: var(--white); border-radius: var(--radius-lg); width: 100%; max-width: 520px; padding: 2.5rem; box-shadow: var(--shadow-lg); }
        .auth-logo { text-align: center; margin-bottom: 2rem; }
        .auth-logo .brand { font-family: var(--font-display); font-size: 2rem; color: var(--primary); }
        .password-strength { height: 4px; border-radius: 2px; background: var(--light-gray); margin-top: 0.4rem; transition: all 0.3s; overflow: hidden; }
        .strength-bar { height: 100%; transition: all 0.3s; border-radius: 2px; }
    </style>
</head>
<body>
<nav class="navbar">
    <a href="/index.html" class="nav-logo">Grand<span>Royal</span></a>
    <div class="nav-auth" id="nav-auth"></div>
</nav>

<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="brand">🏨 Grand Royal</div>
        </div>
        <h2 style="text-align:center;margin-bottom:0.4rem;color:var(--secondary)">Create Account</h2>
        <p style="text-align:center;color:var(--mid-gray);font-size:0.88rem;margin-bottom:2rem">Join us for exclusive member benefits</p>

        <div id="msg" class="hidden"></div>

        <form id="reg-form" onsubmit="handleRegister(event)">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Full Name *</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" id="phone" class="form-control" placeholder="+91-XXXXXXXXXX">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Email Address *</label>
                <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Address</label>
                <input type="text" id="address" class="form-control" placeholder="Your home address">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Password *</label>
                    <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required oninput="checkStrength(this.value)">
                    <div class="password-strength"><div class="strength-bar" id="strength-bar"></div></div>
                    <span class="form-hint" id="strength-label"></span>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password *</label>
                    <input type="password" id="confirm" class="form-control" placeholder="Repeat password" required>
                </div>
            </div>
            <button type="submit" id="reg-btn" class="btn btn-primary btn-block btn-lg" style="margin-top:0.5rem">
                Create Account
            </button>
        </form>
        <p style="text-align:center;margin-top:1.5rem;font-size:0.88rem;color:var(--mid-gray)">
            Already have an account? <a href="/pages/login.html" style="color:var(--primary);font-weight:500">Login here</a>
        </p>
    </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/js/api.js"></script>
<script>
    if (isLoggedIn()) window.location.href = '/index.html';

    function checkStrength(val) {
        const bar   = document.getElementById('strength-bar');
        const label = document.getElementById('strength-label');
        let score = 0;
        if (val.length >= 6) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^a-zA-Z0-9]/.test(val)) score++;
        const levels = [
            { pct:'25%', bg:'#e74c3c', txt:'Weak' },
            { pct:'50%', bg:'#e67e22', txt:'Fair' },
            { pct:'75%', bg:'#f39c12', txt:'Good' },
            { pct:'100%', bg:'#2ecc71', txt:'Strong' },
        ];
        const l = levels[score - 1] || levels[0];
        bar.style.width = score ? l.pct : '0%';
        bar.style.background = l.bg;
        label.textContent = score ? l.txt : '';
        label.style.color = l.bg;
    }

    async function handleRegister(e) {
        e.preventDefault();
        const msgEl = document.getElementById('msg');
        msgEl.className = 'hidden';

        const name     = document.getElementById('name').value.trim();
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('confirm').value;
        const phone    = document.getElementById('phone').value.trim();
        const address  = document.getElementById('address').value.trim();

        if (password !== confirm) {
            msgEl.className = 'alert alert-error';
            msgEl.textContent = '❌ Passwords do not match.';
            return;
        }
        if (password.length < 6) {
            msgEl.className = 'alert alert-error';
            msgEl.textContent = '❌ Password must be at least 6 characters.';
            return;
        }

        const btn = document.getElementById('reg-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Creating account...';

        const { ok, data } = await AuthAPI.register({ name, email, password, phone, address });

        if (ok && data.success) {
            setAuth(data.token, data.user);
            showToast('Account created! Redirecting...', 'success');
            setTimeout(() => window.location.href = '/pages/rooms.html', 1200);
        } else {
            msgEl.className = 'alert alert-error';
            msgEl.textContent = '❌ ' + (data.message || 'Registration failed.');
            btn.disabled = false;
            btn.textContent = 'Create Account';
        }
    }
</script>
</body>
</html>
